<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study Hub — Home</title>
  <link rel="stylesheet" href="shared.css">
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <script>
    // Check if user is logged in, if not redirect to verification
    if (!localStorage.getItem('currentUser')) {
      window.location.href = 'verification.html';
    }
  </script>
 
  <div class="wave-shimmer"></div>
 
  <!-- DESKTOP LAYOUT (hidden on mobile) -->
  <div class="layout desktop-layout">
    <!-- ========== LEFT SIDEBAR (30%) ========== -->
    <aside class="panel panel-left">
      <!-- Add Subject -->
      <div class="content-box">
        <span class="box-label">Add Subject</span>
        <input class="input-field" id="subjectInput" placeholder="Subject name…">
        <input class="input-field" id="descInput" placeholder="Description…">
        <div class="row-2">
          <button class="btn btn-yellow" id="createSubjectBtn">Create</button>
          <button class="btn btn-ghost" id="resetBtn">Reset</button>
        </div>
      </div>
 
      <!-- Create Study Plan -->
      <div class="content-box">
        <button class="btn btn-yellow btn-full btn-icon-label" id="goStudyPlanBtn">
          <span>📚</span> Create Study Plan
        </button>
      </div>
 
      <!-- Search Results (70% vh) -->
      <div class="content-box search-results-box">
        <span class="box-label">Search Results</span>
        <div class="search-results" id="searchResults">
          <p class="hint-text">type something to search…</p>
        </div>
      </div>
 
      <!-- Search Input -->
      <div class="content-box">
        <div class="search-row">
          <input class="input-field" id="searchInput" placeholder="Search…">
          <button class="btn btn-yellow search-icon-btn" id="searchBtn">🔍</button>
        </div>
      </div>
    </aside>
 
    <!-- ========== CENTER (40%) ========== -->
    <main class="panel panel-center">
      <!-- Subject Display Box (50% vh) -->
      <div class="content-box subject-display-box">
        <span class="box-label">Subjects</span>
        <div class="subjects-list" id="subjectsList">
          <p class="hint-text">ex: for added subject can view stay!</p>
        </div>
      </div>
 
      <!-- Day-Order Display (45% vh) -->
      <div class="content-box dayorder-display-box">
        <span class="box-label">Day-Order Schedule</span>
        <div class="dayorder-tabs" id="dayorderTabs">
          <button class="day-tab active-tab" data-day="1">Day 1</button>
          <button class="day-tab" data-day="2">Day 2</button>
          <button class="day-tab" data-day="3">Day 3</button>
          <button class="day-tab" data-day="4">Day 4</button>
          <button class="day-tab" data-day="5">Day 5</button>
        </div>
        <div class="dayorder-list" id="dayorderList">
          <p class="hint-text">No entries for this day.</p>
        </div>
      </div>
    </main>
 
    <!-- ========== RIGHT SIDEBAR (30%) ========== -->
    <aside class="panel panel-right">
      <!-- Clock -->
      <div class="content-box clock-box">
        <div class="clock-rect" id="clockRect">
          <span class="clock-time" id="clockTime">00:00</span>
        </div>
      </div>
 
      <!-- Create Day-Order -->
      <div class="content-box">
        <span class="box-label">Create Day-Order</span>
        <select class="input-field" id="daySelect">
          <option value="1">Day 1</option>
          <option value="2">Day 2</option>
          <option value="3">Day 3</option>
          <option value="4">Day 4</option>
          <option value="5">Day 5</option>
        </select>
        <input class="input-field" id="daySubjectInput" placeholder="Subject…">
        <div class="time-row">
          <input type="time" class="input-field" id="startTime">
          <span class="arrow-sep">→</span>
          <input type="time" class="input-field" id="endTime">
        </div>
        <button class="btn btn-yellow btn-full" id="createDayOrderBtn">Create</button>
      </div>
 
      <!-- Create Folder (staging) -->
      <div class="content-box">
        <span class="box-label">Create Folder</span>
        <input class="input-field" id="folderNameInput" placeholder="Folder name…">
        <div id="pendingFilesList" class="pending-files"></div>
        <div class="row-2">
          <button class="btn btn-ghost" id="addPendingFileBtn">+ Add File</button>
          <button class="btn btn-yellow" id="createFolderBtn">Create</button>
        </div>
      </div>
    </aside>
  </div>
 
  <!-- MOBILE LAYOUT (hidden on desktop) -->
  <div class="mobile-layout">
    <!-- LEFT MENU BUTTON (15% x 15%) -->
    <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
 
    <!-- DAY COLUMNS BOX (15% x 40%) -->
    <div class="mobile-day-box">
      <button class="mobile-day-btn" onclick="selectMobileDay(1)">1</button>
      <button class="mobile-day-btn" onclick="selectMobileDay(2)">2</button>
      <button class="mobile-day-btn" onclick="selectMobileDay(3)">3</button>
      <button class="mobile-day-btn" onclick="selectMobileDay(4)">4</button>
      <button class="mobile-day-btn" onclick="selectMobileDay(5)">5</button>
    </div>
 
    <!-- SRM STUDIQUE BUTTON (15% x 25%) -->
    <a href="https://studique.in/auth/login" target="_blank" class="mobile-studique-btn">
      📚 SRM<br>Studique
    </a>
 
    <!-- RIGHT CONTENT AREA - DAY ORDER SUBJECTS -->
    <div class="mobile-content-area">
      <div id="mobileContentBox" class="mobile-content-box">
        <p class="hint-text">Select a day</p>
      </div>
    </div>
  </div>
 
  <!-- MOBILE MENU SLIDE (70% x 100%) -->
  <div class="mobile-menu-slide" id="mobileMenuSlide">
    <div class="mobile-menu-content">
      <button class="mobile-menu-close" id="mobileMenuClose">✕</button>
      
      <div class="mobile-menu-title">Create Day Order</div>
 
      <select class="input-field" id="mobileDaySelect">
        <option value="1">Day 1</option>
        <option value="2">Day 2</option>
        <option value="3">Day 3</option>
        <option value="4">Day 4</option>
        <option value="5">Day 5</option>
      </select>
 
      <select class="input-field" id="mobileSubjectSelect">
        <option value="">-- Select Subject --</option>
      </select>
 
      <input type="time" class="input-field" id="mobileStartTime" placeholder="Start time">
      <input type="time" class="input-field" id="mobileEndTime" placeholder="End time">
 
      <button class="btn btn-yellow btn-full" id="mobileCreateBtn">Create</button>
 
      <div class="mobile-menu-bottom">
        <a href="https://studique.in/auth/login" target="_blank" class="mobile-menu-studique-btn">
          📚 SRM Studique
        </a>
      </div>
    </div>
  </div>
 
  <!-- Taskbar -->
  <div class="taskbar">
    <button class="nav-btn active" onclick="navigateTo('index.html')">🏠 Home</button>
    <button class="nav-btn" onclick="navigateTo('folder.html')">📁 Folder</button>
    <button class="nav-btn" onclick="navigateTo('studyplan.html')">📋 Study Plan</button>
  </div>
 
  <!-- ADD FILE MODAL -->
  <div class="modal" id="addFileModal">
    <div class="modal-overlay" id="addFileOverlay"></div>
    <div class="modal-box">
      <div class="modal-title">Add File to Folder</div>
      <button class="modal-close" id="closeAddFile">✕</button>
      <input class="input-field" id="pendingFileName" placeholder="File name…">
      <label class="upload-zone" id="uploadZone">
        <span id="uploadLabel">📂 Click to choose file</span>
        <input type="file" id="fileInputHidden" style="display:none">
      </label>
      <div class="modal-row">
        <button class="btn btn-ghost btn-full" id="cancelAddFile">Cancel</button>
        <button class="btn btn-yellow btn-full" id="confirmAddFile">Add</button>
      </div>
    </div>
  </div>
 
  <!-- Notification -->
  <div class="notification" id="notification"><span id="notifText"></span></div>
 
  <script src="Index.js"></script>
  <script>
    // Navigation function
    function navigateTo(page) {
      window.location.href = page;
    }
 
    // Mobile day selection
    let mobileSelectedDay = 1;
    function selectMobileDay(day) {
      mobileSelectedDay = day;
      document.querySelectorAll('.mobile-day-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('.mobile-day-btn')[day - 1].classList.add('active');
      renderMobileDayContent();
    }
 
    function renderMobileDayContent() {
      if (typeof homeApp === 'undefined' || !homeApp) return;
      const dayOrders = homeApp.dayOrders.filter(d => d.day === String(mobileSelectedDay));
      const container = document.getElementById('mobileContentBox');
      if (!container) return;
      
      if (dayOrders.length === 0) {
        container.innerHTML = '<p class="hint-text">No subjects for Day ' + mobileSelectedDay + '</p>';
        return;
      }
 
      container.innerHTML = dayOrders.map(d => `
        <div class="mobile-dayorder-item">
          <div class="mobile-dayorder-subject">📚 ${homeApp.escapeHtml(d.subject)}</div>
          <div class="mobile-dayorder-time">⏰ ${d.start} → ${d.end}</div>
        </div>
      `).join('');
    }
 
    // Mobile menu setup
    function setupMobileMenuListeners() {
      const menuBtn = document.getElementById('mobileMenuBtn');
      const menuSlide = document.getElementById('mobileMenuSlide');
      const closeBtn = document.getElementById('mobileMenuClose');
 
      if (!menuBtn || !menuSlide) return;
 
      menuBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        menuSlide.classList.add('open');
        updateMobileSubjectSelect();
      });
 
      closeBtn.addEventListener('click', () => {
        menuSlide.classList.remove('open');
      });
 
      document.addEventListener('click', (e) => {
        if (menuSlide && !menuSlide.contains(e.target) && e.target !== menuBtn) {
          menuSlide.classList.remove('open');
        }
      });
 
      const createBtn = document.getElementById('mobileCreateBtn');
      if (createBtn) {
        createBtn.addEventListener('click', () => {
          if (typeof homeApp === 'undefined') return;
          const day = document.getElementById('mobileDaySelect').value;
          const subject = document.getElementById('mobileSubjectSelect').value;
          const start = document.getElementById('mobileStartTime').value;
          const end = document.getElementById('mobileEndTime').value;
 
          if (!subject || !start || !end) {
            homeApp.notify('Fill all fields!');
            return;
          }
 
          homeApp.dayOrders.push({ id: Date.now(), day, subject, start, end });
          homeApp.saveData();
          mobileSelectedDay = parseInt(day);
          selectMobileDay(mobileSelectedDay);
          menuSlide.classList.remove('open');
          homeApp.notify('✅ Day order created!');
        });
      }
    }
 
    function updateMobileSubjectSelect() {
      const select = document.getElementById('mobileSubjectSelect');
      if (!select) return;
      select.innerHTML = '<option value="">-- Select Subject --</option>';
      if (typeof homeApp !== 'undefined' && homeApp && homeApp.subjects) {
        homeApp.subjects.forEach(s => {
          const opt = document.createElement('option');
          opt.value = s.name;
          opt.textContent = s.name;
          select.appendChild(opt);
        });
      }
    }
 
    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      selectMobileDay(1);
      setupMobileMenuListeners();
    });
 
    setTimeout(() => {
      setupMobileMenuListeners();
      renderMobileDayContent();
    }, 500);
  </script>
</body>
</html>
