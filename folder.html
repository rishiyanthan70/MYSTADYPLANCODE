<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study Hub — Folders</title>
  <link rel="stylesheet" href="shared.css">
  <link rel="stylesheet" href="folder.css">
</head>
<body>
  <div class="wave-shimmer"></div>
 
  <!-- DESKTOP LAYOUT -->
  <div class="layout desktop-layout">
    <!-- ========== LEFT SIDEBAR (25%) ========== -->
    <aside class="panel panel-left">
      <!-- Search -->
      <div class="content-box">
        <div class="search-row">
          <input class="input-field search-input" id="folderSearch" placeholder="Search…">
          <button class="btn btn-yellow search-icon-btn" id="searchFoldersBtn">🔍</button>
        </div>
      </div>
 
      <!-- Created Folders List -->
      <div class="content-box folders-list-box">
        <span class="box-label">Folders</span>
        <div class="folders-list" id="foldersList">
          <p class="hint-text">No folders</p>
        </div>
      </div>
 
      <!-- Create Button -->
      <div class="content-box">
        <button class="btn btn-yellow btn-full" id="createNewFolderBtn">+ Create</button>
      </div>
    </aside>
 
    <!-- ========== CENTER (75%) ========== -->
    <main class="panel panel-center-extended">
      <!-- Folder Contents -->
      <div class="content-box folder-content-box">
        <span class="box-label" id="folderTitle">📁 Folder Contents</span>
        <div class="folder-contents" id="folderContents">
          <p class="hint-text">Double-click a folder to open</p>
        </div>
      </div>
 
      <!-- Helpers Section -->
      <div class="content-box helpers-box">
        <span class="box-label">📚 Helpers</span>
        <a href="https://thehelpers.tech/semesters" target="_blank" class="helpers-link">
          Open Helpers Platform →
        </a>
      </div>
    </main>
  </div>
 
  <!-- MOBILE LAYOUT -->
  <div class="mobile-layout">
    <!-- LEFT FOLDER LIST (15% width, 80% height) -->
    <div class="mobile-folder-list-container">
      <div class="mobile-folder-list" id="mobileFolderList">
        <p class="hint-text">No folders</p>
      </div>
    </div>
 
    <!-- RIGHT CONTENT AREA -->
    <div class="mobile-folder-content-area">
      <!-- Folder Header with Search -->
      <div class="mobile-folder-header">
        <input type="text" class="input-field" id="mobileFolderSearch" placeholder="Search…">
      </div>
 
      <!-- Files Display -->
      <div class="mobile-files-display" id="mobileFilesDisplay">
        <p class="hint-text">Select a folder</p>
      </div>
 
      <!-- Helpers Button (appears when folder selected) -->
      <div class="mobile-helpers-section" id="mobileHelpersSection" style="display: none;">
        <a href="https://thehelpers.tech/" target="_blank" class="mobile-helpers-btn">
          📚 Helpers
        </a>
      </div>
    </div>
 
    <!-- FOLDER OPERATIONS SLIDE MENU (70% width, left to right) -->
    <div class="mobile-folder-slide" id="mobileFolderSlide">
      <button class="mobile-folder-slide-close" id="closeFolderSlide">✕</button>
      
      <div class="mobile-folder-slide-title">Folder Operations</div>
 
      <!-- Create Folder Section -->
      <div class="mobile-folder-slide-section">
        <div class="mobile-section-label">+ Create Folder</div>
        <input type="text" class="input-field" id="mobileNewFolderName" placeholder="Folder name…">
        <button class="btn btn-yellow btn-full" id="mobileCreateFolderBtn">Create</button>
      </div>
 
      <!-- Delete Folder Section -->
      <div class="mobile-folder-slide-section" id="mobileDeleteFolderSection" style="display: none;">
        <div class="mobile-section-label">🗑️ Delete Folder</div>
        <div id="mobileCurrentFolderName" style="color: #cc3333; font-weight: bold; margin-bottom: 10px; text-align: center;"></div>
        <button class="btn btn-ghost btn-full" id="mobileDeleteFolderBtn">Delete</button>
      </div>
    </div>
 
    <!-- FOLDER SLIDE TOGGLE BUTTON -->
    <button class="mobile-folder-menu-btn" id="mobileFolderMenuBtn">⚙️</button>
  </div>
 
  <!-- Taskbar -->
  <div class="taskbar">
    <button class="nav-btn" onclick="navigateTo('index.html')">🏠 Home</button>
    <button class="nav-btn active" onclick="navigateTo('folder.html')">📁 Folder</button>
    <button class="nav-btn" onclick="navigateTo('studyplan.html')">📋 Study Plan</button>
  </div>
 
  <!-- CREATE FOLDER MODAL -->
  <div class="modal" id="createFolderModal">
    <div class="modal-overlay" id="createFolderOverlay"></div>
    <div class="modal-box">
      <div class="modal-title">Create New Folder</div>
      <button class="modal-close" id="closeFolderModal">✕</button>
      <input class="input-field" id="newFolderName" placeholder="Folder name…">
      <div class="modal-row">
        <button class="btn btn-ghost btn-full" id="cancelFolderModal">Cancel</button>
        <button class="btn btn-yellow btn-full" id="confirmFolderModal">Create</button>
      </div>
    </div>
  </div>
 
  <!-- ADD FILE MODAL -->
  <div class="modal" id="addFileModal">
    <div class="modal-overlay" id="addFileOverlay"></div>
    <div class="modal-box">
      <div class="modal-title">Add File to Folder</div>
      <button class="modal-close" id="closeAddFileModal">✕</button>
      
      <input class="input-field" id="fileNameInput" placeholder="File name…">
      
      <label class="upload-zone" id="uploadZone">
        <span id="uploadLabel">📂 Select from System</span>
        <input type="file" id="fileInputFromSystem" style="display:none">
      </label>
      
      <div class="modal-row">
        <button class="btn btn-ghost btn-full" id="cancelAddFileModal">Cancel</button>
        <button class="btn btn-yellow btn-full" id="confirmAddFileModal">Add File</button>
      </div>
    </div>
  </div>
 
  <!-- Notification -->
  <div class="notification" id="notification"><span id="notifText"></span></div>
 
  <script src="folder.js"></script>
  <script>
    // Navigation function
    function navigateTo(page) {
      window.location.href = page;
    }
 
    // Mobile folder functions
    let mobileCurrentFolder = null;
 
    function renderMobileFolders() {
      if (typeof folderApp === 'undefined' || !folderApp) return;
      const container = document.getElementById('mobileFolderList');
      if (!container) return;
 
      if (folderApp.folders.length === 0) {
        container.innerHTML = '<p class="hint-text">No folders</p>';
        return;
      }
 
      container.innerHTML = folderApp.folders.map(f => `
        <div class="mobile-folder-item" onclick="openMobileFolder(${f.id})">
          <div class="mobile-folder-name">${f.name.substring(0, 3).toUpperCase()}</div>
          <div class="mobile-folder-arrow">→</div>
        </div>
      `).join('');
    }
 
    function openMobileFolder(id) {
      if (typeof folderApp === 'undefined' || !folderApp) return;
      mobileCurrentFolder = folderApp.folders.find(f => f.id === id);
      if (!mobileCurrentFolder) return;
 
      const container = document.getElementById('mobileFilesDisplay');
      const helpersBtn = document.getElementById('mobileHelpersSection');
      if (!container) return;
 
      // Show helpers button
      if (helpersBtn) {
        helpersBtn.style.display = 'flex';
      }
 
      if (mobileCurrentFolder.files.length === 0) {
        container.innerHTML = '<p class="hint-text">📁 ' + mobileCurrentFolder.name + '<br><br>Folder is empty</p>';
        return;
      }
 
      let html = `<div style="padding: 8px 0; color: #cc3333; font-weight: bold; border-bottom: 2px solid rgba(204,51,51,.3); margin-bottom: 8px;">📁 ${mobileCurrentFolder.name}</div>`;
      
      html += mobileCurrentFolder.files.map((f, idx) => `
        <div class="mobile-file-item">
          <div style="display: flex; align-items: center; flex: 1;">
            <span class="mobile-file-icon">📄</span>
            <span class="mobile-file-name">${f}</span>
          </div>
          <div class="mobile-file-actions">
            <button class="mobile-file-btn mobile-file-download" onclick="folderApp.downloadFile('${f}'); event.stopPropagation();">⬇️</button>
            <button class="mobile-file-btn mobile-file-delete" onclick="folderApp.deleteFile(${idx}); event.stopPropagation();">🗑️</button>
          </div>
        </div>
      `).join('');
 
      container.innerHTML = html;
    }
 
    // Initialize mobile view
    setTimeout(() => {
      renderMobileFolders();
      setupMobileFolderSlideMenu();
    }, 100);
 
    setInterval(() => {
      renderMobileFolders();
    }, 2000);
 
    // FOLDER SLIDE MENU SETUP
    function setupMobileFolderSlideMenu() {
      const menuBtn = document.getElementById('mobileFolderMenuBtn');
      const slide = document.getElementById('mobileFolderSlide');
      const closeBtn = document.getElementById('closeFolderSlide');
 
      if (!menuBtn || !slide) return;
 
      // Open menu
      menuBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        slide.classList.add('open');
        updateMobileDeleteFolderSection();
      });
 
      // Close menu
      closeBtn.addEventListener('click', () => {
        slide.classList.remove('open');
      });
 
      // Close when clicking outside
      document.addEventListener('click', (e) => {
        if (slide && !slide.contains(e.target) && e.target !== menuBtn) {
          slide.classList.remove('open');
        }
      });
 
      // Create folder
      const createBtn = document.getElementById('mobileCreateFolderBtn');
      if (createBtn) {
        createBtn.addEventListener('click', () => {
          const name = document.getElementById('mobileNewFolderName').value.trim();
          if (!name) {
            folderApp.notify('Enter folder name!');
            return;
          }
          folderApp.folders.push({
            id: Date.now(),
            name: name,
            files: [],
            date: new Date().toLocaleDateString()
          });
          folderApp.saveData();
          document.getElementById('mobileNewFolderName').value = '';
          renderMobileFolders();
          slide.classList.remove('open');
          folderApp.notify('📁 Folder created!');
        });
      }
 
      // Delete folder
      const deleteBtn = document.getElementById('mobileDeleteFolderBtn');
      if (deleteBtn) {
        deleteBtn.addEventListener('click', () => {
          if (!mobileCurrentFolder) {
            folderApp.notify('No folder selected!');
            return;
          }
          if (confirm(`Are you sure you want to delete "${mobileCurrentFolder.name}"? This action cannot be undone.`)) {
            folderApp.deleteFolder(mobileCurrentFolder.id);
            mobileCurrentFolder = null;
            document.getElementById('mobileFilesDisplay').innerHTML = '<p class="hint-text">Select a folder</p>';
            const helpersBtn = document.getElementById('mobileHelpersSection');
            if (helpersBtn) helpersBtn.style.display = 'none';
            renderMobileFolders();
            slide.classList.remove('open');
            folderApp.notify('📁 Folder deleted!');
          }
        });
      }
    }
 
    function updateMobileDeleteFolderSection() {
      const section = document.getElementById('mobileDeleteFolderSection');
      const nameDisplay = document.getElementById('mobileCurrentFolderName');
      
      if (mobileCurrentFolder && section && nameDisplay) {
        section.style.display = 'flex';
        nameDisplay.textContent = `📁 ${mobileCurrentFolder.name}`;
      } else if (section) {
        section.style.display = 'none';
      }
    }
  </script>
</body>
</html>
