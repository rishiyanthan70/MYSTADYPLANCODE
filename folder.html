<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study Hub — Folders</title>
  <link rel="stylesheet" href="shared.css">
  <link rel="stylesheet" href="folder.css">
</head>
<body>
  <div class="wave-shimmer"></div>
 
  <!-- DESKTOP LAYOUT -->
  <div class="layout desktop-layout">
    <!-- ========== LEFT SIDEBAR (25%) ========== -->
    <aside class="panel panel-left">
      <!-- Search -->
      <div class="content-box">
        <div class="search-row">
          <input class="input-field search-input" id="folderSearch" placeholder="Search…">
          <button class="btn btn-yellow search-icon-btn" id="searchFoldersBtn">🔍</button>
        </div>
      </div>
 
      <!-- Created Folders List -->
      <div class="content-box folders-list-box">
        <span class="box-label">Folders</span>
        <div class="folders-list" id="foldersList">
          <p class="hint-text">No folders</p>
        </div>
      </div>
 
      <!-- Create Button -->
      <div class="content-box">
        <button class="btn btn-yellow btn-full" id="createNewFolderBtn">+ Create</button>
      </div>
    </aside>
 
    <!-- ========== CENTER (75%) ========== -->
    <main class="panel panel-center-extended">
      <!-- Folder Contents with Settings Button -->
      <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 5px;">
        <h3 style="flex: 1; color: #ffd700; margin: 0;">📁 Folder Contents</h3>
        <button class="btn btn-yellow" id="desktopSettingsBtn" title="Create Folder / Add File" style="padding: 6px 12px; font-size: 0.75rem;">⚙️ Options</button>
      </div>
      
      <!-- Folder Contents -->
      <div class="content-box folder-content-box">
        <span class="box-label" id="folderTitle" style="display: none;"></span>
        <div class="folder-contents" id="folderContents">
          <p class="hint-text">Double-click a folder to open</p>
        </div>
      </div>
 
      <!-- Helpers Section -->
      <div class="content-box helpers-box">
        <span class="box-label">📚 Helpers</span>
        <a href="https://thehelpers.tech/semesters" target="_blank" class="helpers-link">
          Open Helpers Platform →
        </a>
      </div>
    </main>
  </div>
 
  <!-- MOBILE LAYOUT -->
  <div class="mobile-layout">
    <!-- LEFT FOLDER LIST (15% width, 80% height) -->
    <div class="mobile-folder-list-container">
      <div class="mobile-folder-list" id="mobileFolderList">
        <p class="hint-text">No folders</p>
      </div>
    </div>
 
    <!-- RIGHT CONTENT AREA -->
    <div class="mobile-folder-content-area">
      <!-- Folder Header with Search -->
      <div class="mobile-folder-header">
        <input type="text" class="input-field" id="mobileFolderSearch" placeholder="Search…">
      </div>
 
      <!-- Files Display -->
      <div class="mobile-files-display" id="mobileFilesDisplay">
        <p class="hint-text">Select a folder</p>
      </div>
 
      <!-- Helpers Button & Settings Button -->
      <div class="mobile-bottom-buttons">
        <a href="https://thehelpers.tech/" target="_blank" class="mobile-helpers-btn">
          📚 Helpers
        </a>
        <button class="mobile-settings-btn" id="mobileSettingsBtn">⚙️</button>
      </div>
    </div>
 
    <!-- SETTINGS PANEL - SLIDES FROM RIGHT -->
    <div class="mobile-settings-panel" id="mobileSettingsPanel">
      <button class="mobile-settings-close" id="mobileSettingsClose">✕</button>
      
      <div class="mobile-settings-title">Folder Options</div>
 
      <!-- Create Folder Section -->
      <div class="mobile-settings-section">
        <div class="mobile-settings-label">+ Create Folder</div>
        <input type="text" class="input-field" id="mobileNewFolderName" placeholder="Folder name…">
        <button class="btn btn-yellow btn-full" id="mobileCreateFolderBtn">Create</button>
      </div>
 
      <!-- Add File Section -->
      <div class="mobile-settings-section">
        <div class="mobile-settings-label">+ Add File</div>
        <input type="text" class="input-field" id="mobileFileName" placeholder="File name…">
        <label class="upload-zone upload-zone-mobile" id="mobileUploadZone">
          <span id="mobileUploadLabel">📂 Select from System</span>
          <input type="file" id="mobileFileInputFromSystem" style="display:none">
        </label>
        <button class="btn btn-yellow btn-full" id="mobileAddFileBtn">Add File</button>
      </div>
    </div>
  </div>
 
  <!-- Taskbar -->
  <div class="taskbar">
    <button class="nav-btn" onclick="navigateTo('index.html')">🏠 Home</button>
    <button class="nav-btn active" onclick="navigateTo('folder.html')">📁 Folder</button>
    <button class="nav-btn" onclick="navigateTo('studyplan.html')">📋 Study Plan</button>
  </div>
 
  <!-- CREATE FOLDER MODAL -->
  <div class="modal" id="createFolderModal">
    <div class="modal-overlay" id="createFolderOverlay"></div>
    <div class="modal-box">
      <div class="modal-title">Create New Folder</div>
      <button class="modal-close" id="closeFolderModal">✕</button>
      <input class="input-field" id="newFolderName" placeholder="Folder name…">
      <div class="modal-row">
        <button class="btn btn-ghost btn-full" id="cancelFolderModal">Cancel</button>
        <button class="btn btn-yellow btn-full" id="confirmFolderModal">Create</button>
      </div>
    </div>
  </div>
 
  <!-- ADD FILE MODAL -->
  <div class="modal" id="addFileModal">
    <div class="modal-overlay" id="addFileOverlay"></div>
    <div class="modal-box">
      <div class="modal-title">Add File to Folder</div>
      <button class="modal-close" id="closeAddFileModal">✕</button>
      
      <input class="input-field" id="fileNameInput" placeholder="File name…">
      
      <label class="upload-zone" id="uploadZone">
        <span id="uploadLabel">📂 Select from System</span>
        <input type="file" id="fileInputFromSystem" style="display:none">
      </label>
      
      <div class="modal-row">
        <button class="btn btn-ghost btn-full" id="cancelAddFileModal">Cancel</button>
        <button class="btn btn-yellow btn-full" id="confirmAddFileModal">Add File</button>
      </div>
    </div>
  </div>
 
  <!-- DESKTOP SETTINGS MODAL -->
  <div class="modal" id="desktopSettingsModal">
    <div class="modal-overlay" id="desktopSettingsOverlay"></div>
    <div class="modal-box">
      <div class="modal-title">Folder Options</div>
      <button class="modal-close" id="closeDesktopSettingsModal">✕</button>
      
      <!-- Create Folder Section -->
      <div style="margin-bottom: 20px; padding-bottom: 20px; border-bottom: 2px solid rgba(204,51,51,0.3);">
        <div style="color: #cc3333; font-weight: bold; margin-bottom: 10px;">+ Create Folder</div>
        <input class="input-field" id="desktopNewFolderName" placeholder="Folder name…">
        <button class="btn btn-yellow btn-full" id="desktopCreateFolderBtn">Create Folder</button>
      </div>
      
      <!-- Add File Section -->
      <div>
        <div style="color: #cc3333; font-weight: bold; margin-bottom: 10px;">+ Add File</div>
        <input class="input-field" id="desktopFileName" placeholder="File name…">
        <label class="upload-zone" id="desktopUploadZone" style="margin: 10px 0;">
          <span id="desktopUploadLabel">📂 Select from System</span>
          <input type="file" id="desktopFileInputFromSystem" style="display:none">
        </label>
        <button class="btn btn-yellow btn-full" id="desktopAddFileBtn">Add File</button>
      </div>
      
      <div class="modal-row" style="margin-top: 20px;">
        <button class="btn btn-ghost btn-full" id="closeDesktopSettingsBtn">Close</button>
      </div>
    </div>
  </div>
 
  <!-- Notification -->
  <div class="notification" id="notification"><span id="notifText"></span></div>
 
  <script src="folder.js"></script>
  <script>
    // Navigation function
    function navigateTo(page) {
      window.location.href = page;
    }
 
    // Mobile folder functions
    let mobileCurrentFolder = null;
 
    function renderMobileFolders() {
      if (typeof folderApp === 'undefined' || !folderApp) return;
      const container = document.getElementById('mobileFolderList');
      if (!container) return;
 
      if (folderApp.folders.length === 0) {
        container.innerHTML = '<p class="hint-text">No folders</p>';
        return;
      }
 
      container.innerHTML = folderApp.folders.map(f => `
        <div class="mobile-folder-item" onclick="openMobileFolder(${f.id})">
          <div class="mobile-folder-name">${f.name.substring(0, 3).toUpperCase()}</div>
          <div class="mobile-folder-arrow">→</div>
        </div>
      `).join('');
    }
 
    function openMobileFolder(id) {
      if (typeof folderApp === 'undefined' || !folderApp) return;
      mobileCurrentFolder = folderApp.folders.find(f => f.id === id);
      if (!mobileCurrentFolder) return;
 
      const container = document.getElementById('mobileFilesDisplay');
      if (!container) return;
 
      if (mobileCurrentFolder.files.length === 0) {
        container.innerHTML = '<p class="hint-text">📁 ' + mobileCurrentFolder.name + '<br><br>Folder is empty</p>';
        return;
      }
 
      let html = `<div style="padding: 8px 0; color: #ffd700; font-weight: bold; border-bottom: 2px solid rgba(255,215,0,.3); margin-bottom: 8px;">📁 ${mobileCurrentFolder.name}</div>`;
      
      html += mobileCurrentFolder.files.map((f, idx) => `
        <div class="mobile-file-item">
          <div style="display: flex; align-items: center; flex: 1;">
            <span class="mobile-file-icon">📄</span>
            <span class="mobile-file-name">${f}</span>
          </div>
          <div class="mobile-file-actions">
            <button class="mobile-file-btn mobile-file-download" onclick="folderApp.downloadFile('${f}'); event.stopPropagation();">⬇️</button>
            <button class="mobile-file-btn mobile-file-delete" onclick="folderApp.deleteFile(${idx}); event.stopPropagation();">🗑️</button>
          </div>
        </div>
      `).join('');
 
      container.innerHTML = html;
    }
 
    // Initialize mobile view
    setTimeout(() => {
      renderMobileFolders();
    }, 100);
 
    setInterval(() => {
      renderMobileFolders();
    }, 2000);
 
    // SETTINGS PANEL SETUP
    function setupMobileSettings() {
      const settingsBtn = document.getElementById('mobileSettingsBtn');
      const settingsPanel = document.getElementById('mobileSettingsPanel');
      const closeBtn = document.getElementById('mobileSettingsClose');
      const createFolderBtn = document.getElementById('mobileCreateFolderBtn');
      const addFileBtn = document.getElementById('mobileAddFileBtn');
      const fileInput = document.getElementById('mobileFileInputFromSystem');
      const fileName = document.getElementById('mobileFileName');
 
      if (!settingsBtn || !settingsPanel) return;
 
      // Open settings panel
      settingsBtn.addEventListener('click', () => {
        settingsPanel.classList.add('open');
      });
 
      // Close settings panel
      closeBtn.addEventListener('click', () => {
        settingsPanel.classList.remove('open');
      });
 
      // Create folder
      createFolderBtn.addEventListener('click', () => {
        const name = document.getElementById('mobileNewFolderName').value.trim();
        if (!name) {
          folderApp.notify('Enter folder name!');
          return;
        }
        folderApp.folders.push({
          id: Date.now(),
          name: name,
          files: [],
          date: new Date().toLocaleDateString()
        });
        folderApp.saveData();
        document.getElementById('mobileNewFolderName').value = '';
        renderMobileFolders();
        folderApp.notify('📁 Folder created!');
      });
 
      // File input change
      fileInput.addEventListener('change', (e) => {
        if (e.target.files[0]) {
          fileName.value = e.target.files[0].name;
        }
      });
 
      // Add file
      addFileBtn.addEventListener('click', () => {
        if (!mobileCurrentFolder) {
          folderApp.notify('Select a folder first!');
          return;
        }
        const fName = fileName.value.trim();
        if (!fName) {
          folderApp.notify('Enter file name!');
          return;
        }
        mobileCurrentFolder.files.push(fName);
        folderApp.saveData();
        fileName.value = '';
        fileInput.value = '';
        openMobileFolder(mobileCurrentFolder.id);
        folderApp.notify('📄 File added!');
      });
    }
 
    // Initialize settings
    setTimeout(() => {
      setupMobileSettings();
      setupDesktopSettings();
    }, 200);
 
    // DESKTOP SETTINGS MODAL SETUP
    function setupDesktopSettings() {
      const settingsBtn = document.getElementById('desktopSettingsBtn');
      const settingsModal = document.getElementById('desktopSettingsModal');
      const closeBtn = document.getElementById('closeDesktopSettingsModal');
      const closeBtn2 = document.getElementById('closeDesktopSettingsBtn');
      const overlay = document.getElementById('desktopSettingsOverlay');
      const createFolderBtn = document.getElementById('desktopCreateFolderBtn');
      const addFileBtn = document.getElementById('desktopAddFileBtn');
      const fileInput = document.getElementById('desktopFileInputFromSystem');
      const fileName = document.getElementById('desktopFileName');
 
      if (!settingsBtn) return;
 
      // Open settings modal
      settingsBtn.addEventListener('click', () => {
        settingsModal.classList.add('active');
      });
 
      // Close settings modal
      [closeBtn, closeBtn2, overlay].forEach(btn => {
        if (btn) {
          btn.addEventListener('click', () => {
            settingsModal.classList.remove('active');
          });
        }
      });
 
      // Create folder
      createFolderBtn.addEventListener('click', () => {
        const name = document.getElementById('desktopNewFolderName').value.trim();
        if (!name) {
          folderApp.notify('Enter folder name!');
          return;
        }
        folderApp.folders.push({
          id: Date.now(),
          name: name,
          files: [],
          date: new Date().toLocaleDateString()
        });
        folderApp.saveData();
        document.getElementById('desktopNewFolderName').value = '';
        folderApp.renderFolders();
        folderApp.notify('📁 Folder created!');
      });
 
      // File input change
      fileInput.addEventListener('change', (e) => {
        if (e.target.files[0]) {
          fileName.value = e.target.files[0].name;
        }
      });
 
      // Add file
      addFileBtn.addEventListener('click', () => {
        if (!folderApp.currentFolder) {
          folderApp.notify('Open a folder first!');
          return;
        }
        const fName = fileName.value.trim();
        if (!fName) {
          folderApp.notify('Enter file name!');
          return;
        }
        folderApp.currentFolder.files.push(fName);
        folderApp.saveData();
        fileName.value = '';
        fileInput.value = '';
        folderApp.openFolder(folderApp.currentFolder.id);
        folderApp.notify('📄 File added!');
      });
    }
  </script>
</body>
</html>
